<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUD Homelessness Data Visualization</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>HUD Homelessness Data from 2015-2024</h1>
    <canvas id="barChart"></canvas>
    <canvas id="lineChart"></canvas>
    <script>
        const ctxBar = document.getElementById('barChart').getContext('2d');
        const ctxLine = document.getElementById('lineChart').getContext('2d');

        const data = {
            labels: ['2015', '2016', '2017', '2018', '2019', '2020', '2021', '2022', '2023', '2024'],
            datasets: [{
                label: 'Homelessness Count',
                data: [564000, 553000, 510000, 490000, 450000, 480000, 495000, 500000, 530000, 560000],
                backgroundColor: 'rgba(75, 192, 192, 0.6)',
                borderColor: 'rgba(75, 192, 192, 1)',
                borderWidth: 1,
                type: 'bar'
            }]
        };

        const configBar = {
            type: 'bar',
            data: data,
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        };

        const barChart = new Chart(ctxBar, configBar);

        const dataLine = {
            labels: ['2015', '2016', '2017', '2018', '2019', '2020', '2021', '2022', '2023', '2024'],
            datasets: [{
                label: 'Percent Change',
                data: [0,-1.5,-7.8,-3.9,-8.2,6.7,3.1,1.0,6.0,5.7],
                borderColor: 'rgba(255, 99, 132, 1)',
                borderWidth: 2,
                fill: false,
                type: 'line'
            }]
        };

        const configLine = {
            type: 'line',
            data: dataLine,
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        };

        const lineChart = new Chart(ctxLine, configLine);
    </script>
</body>
</html>
